version: '3.8'

services:
  # 後端 API 服務
  python-api:
    build: ./backend
    restart: always
    # 不需要對外暴露 Port，交給 Nginx 處理

  # Nginx 服務 (對外窗口)
  nginx-server:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"  # 將 Linux 主機的 8080 對應到容器的 80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - python-api
